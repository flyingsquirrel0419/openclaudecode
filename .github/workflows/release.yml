name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin: occ
            asset: occ-x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            bin: occ
            asset: occ-aarch64-unknown-linux-gnu
          - os: macos-14
            target: aarch64-apple-darwin
            bin: occ
            asset: occ-aarch64-apple-darwin
          - os: macos-15-intel
            target: x86_64-apple-darwin
            bin: occ
            asset: occ-x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bin: occ.exe
            asset: occ-x86_64-pc-windows-msvc.exe
          - os: windows-11-arm
            target: aarch64-pc-windows-msvc
            bin: occ.exe
            asset: occ-aarch64-pc-windows-msvc.exe

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - run: cargo test
      - run: cargo build --release --target ${{ matrix.target }}
      - shell: bash
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${{ matrix.bin }}" "dist/${{ matrix.asset }}"
      - uses: actions/upload-artifact@v4
        with:
          name: occ-${{ matrix.target }}
          path: dist/*

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - name: Verify npm publish token
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "::error::Missing repository secret NPM_TOKEN. Set it with: gh secret set NPM_TOKEN --repo flyingsquirrel0419/openclaudecode"
            exit 1
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - run: npm publish --provenance
        working-directory: npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
